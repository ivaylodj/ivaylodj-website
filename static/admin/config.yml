backend:
  name: github
  repo: ivaylodj/ivaylodj-website
  branch: main
  open_repo_check: public

auth_scope: open_repo
# For private repos, remove auth_scope above and add the two lines below:
# auth_scope: repo
# site_domain: cms.ivaylodj.com

# Email login (Decap generates a static file for verification)
provider: email

media_folder: "img/photos"
public_folder: "/img/photos"

editor_formats: [default]

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false}
      - { 
          label: "Cover Image path (relative to img/photos)", 
          name: "cover_image", 
          widget: "image", 
          required: false,
          media_folder: "img/photos",
          public_folder: "/img/photos"
        }
      - {
          label: "Categories", 
          name: "categories", 
          widget: "list", 
          allow_add: true, 
          allow_delete: true, 
          clear_all: false, 
          min: 1,
          default: ["General"],
          summary: "{{value}}",
          field: {label: "Category", name: "category", widget: "string"}
        }
      - {
          label: "Tags", 
          name: "tags", 
          widget: "list", 
          allow_add: true, 
          allow_delete: true, 
          clear_all: false, 
          summary: "{{value}}",
          field: {label: "Tag", name: "tag", widget: "string"}
        }
      - {label: "Excerpt (short summary for blog listing)", name: "excerpt", widget: "text", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "galleries"
    label: "Gallery Pages"
    folder: "portfolio"
    create: false
    identifier_fields: filename
    fields:
      - {label: "Filename", name: "filename", widget: "string"}
      - {label: "Title", name: "title", widget: "string"}
