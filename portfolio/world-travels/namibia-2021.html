<script>
document.addEventListener('DOMContentLoaded', function() {
    var pswpLinks = document.querySelectorAll('.cherga_pswp_slide');
    pswpLinks.forEach(function(link) {
        var img = new Image();
        img.onload = function() {
            link.setAttribute('data-size', img.naturalWidth + 'x' + img.naturalHeight);
        };
        img.src = link.getAttribute('href');
    });
});
</script>
