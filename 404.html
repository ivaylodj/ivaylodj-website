<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>404 — Page Not Found | Ivaylo Djounov</title>
	<meta name="robots" content="noindex, follow">
	<meta name="theme-color" content="#171717">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
	<link rel="icon" href="/favicon.ico" sizes="any">
	<link rel="manifest" href="/site.webmanifest">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css?family=Roboto:300,400,700,900&display=swap" rel="stylesheet">
	<style>
		* { box-sizing: border-box; }
		html, body { height: 100%; margin: 0; }
		body {
			background: #171717;
			color: #fff;
			font-family: "Roboto", sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			padding: 40px 24px;
		}
		.e404_wrap { max-width: 620px; }
		.e404_logo { width: 84px; height: 84px; margin: 0 auto 34px; display: block; }
		.e404_code {
			font-size: 84px; font-weight: 900; line-height: 1;
			letter-spacing: 2px; margin: 0 0 10px;
		}
		.e404_code span { color: #ffbf00; }
		.e404_title {
			font-size: 22px; font-weight: 700; text-transform: uppercase;
			letter-spacing: 3px; margin: 0 0 20px;
		}
		.e404_text { font-size: 16px; line-height: 28px; color: #c8c8c8; margin: 0 0 34px; }
		.e404_links { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; }
		.e404_links a {
			display: inline-block; padding: 13px 26px; border-radius: 2px;
			font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
			text-decoration: none; transition: all 200ms;
		}
		.e404_btn { background: #ffbf00; color: #171717; }
		.e404_btn:hover { background: #fff; }
		.e404_ghost { border: 1px solid #3a3e43; color: #fff; }
		.e404_ghost:hover { border-color: #ffbf00; color: #ffbf00; }
		@media (max-width: 480px) { .e404_code { font-size: 62px; } }
	</style>
</head>
<body>
	<div class="e404_wrap">
		<img class="e404_logo" src="/img/logo.png" alt="Ivaylo Djounov Photography" width="84" height="84" />
		<p class="e404_code">4<span>0</span>4</p>
		<h1 class="e404_title">Page Not Found</h1>
		<p class="e404_text">
			The page you're looking for has drifted out of frame. It may have moved, or the link may be broken.
			Let's get you back to the light.
		</p>
		<div class="e404_links">
			<a class="e404_btn" href="/">Back to Home</a>
			<a class="e404_ghost" href="/portfolio/">Portfolio</a>
			<a class="e404_ghost" href="/blog">Blog</a>
		</div>
	</div>
</body>
</html>
